
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Turan Report</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --header: #0f172a;
      --accent: #2563eb;
      --low: #dbeafe;
      --medium: #fef3c7;
      --high: #fee2e2;
      --critical: #fecaca;
      --info: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 32%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 56px;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: 2.1rem;
      letter-spacing: -0.03em;
      color: var(--header);
    }
    h2 {
      margin: 0 0 12px;
      font-size: 1.15rem;
      color: var(--header);
    }
    .subtitle { margin: 6px 0 0; color: var(--muted); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px 20px;
      margin: 18px 0;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.04);
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: #fafafa;
    }
    .metric-label { display: block; color: var(--muted); font-size: 0.84rem; margin-bottom: 4px; }
    .metric-value { display: block; font-size: 1.05rem; font-weight: 600; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 10px; overflow: hidden; }
    th, td {
      text-align: left;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
    th {
      background: #f8fafc;
      color: var(--header);
      font-size: 0.92rem;
      position: sticky;
      top: 0;
    }
    tr:last-child td { border-bottom: 0; }
    tbody tr:hover td { background: #fcfcfd; }
    .muted { color: var(--muted); }
    .pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      background: #e5e7eb;
      margin-right: 6px;
      font-size: 0.82rem;
      line-height: 1.3;
    }
    .sev-low { background: var(--low); color: #1d4ed8; }
    .sev-medium { background: var(--medium); color: #92400e; }
    .sev-high { background: var(--high); color: #b91c1c; }
    .sev-critical { background: var(--critical); color: #991b1b; }
    .sev-info { background: var(--info); color: #374151; }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .section-label {
      display: inline-block;
      margin-bottom: 10px;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div>
        <h1>Turan Report</h1>
        <p class="subtitle">Target: http://127.0.0.1:8000/</p>
      </div>
      <div class="muted">Generated for local review</div>
    </div>

    <div class="card">
      <span class="section-label">Summary</span>
      <div class="summary-grid">
        <div class="metric"><span class="metric-label">Findings</span><span class="metric-value">1</span></div>
        <div class="metric"><span class="metric-label">Notes</span><span class="metric-value">1</span></div>
        <div class="metric"><span class="metric-label">WAF</span><span class="metric-value">-</span></div>
        <div class="metric"><span class="metric-label">TLS</span><span class="metric-value">-</span></div>
      </div>
      
    </div>

    <div class="card">
      <span class="section-label">Findings</span>
    <table>
      <thead>
        <tr>
          <th>Severity</th>
          <th>Category</th>
          <th>Title</th>
          <th>Evidence</th>
          <th>Impact</th>
        </tr>
      </thead>
      <tbody>
        
        <tr>
          <td><span class="pill sev-low">low</span></td>
          <td>connectivity</td>
          <td>Target unreachable</td>
          <td><pre>{
  "error": "ConnectError",
  "url": "http://127.0.0.1:8000/"
}</pre></td>
          <td>Report only; no system change required.</td>
        </tr>
        
      </tbody>
    </table>
    </div>

    
  </div>
</body>
</html>

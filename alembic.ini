[alembic]
script_location = migrations
prepend_sys_path = .
sqlalchemy.url = sqlalchemy.url = postgresql+psycopg://psybershield:Z6p^M1dL9!sJ4rVt&xB7$@127.0.0.1:5432/psybershield

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
